image: node:22-alpine

variables:
  NX_CLOUD_ACCESS_TOKEN: $NX_CLOUD_ACCESS_TOKEN
  NODE_ENV: test
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  DB_DATABASE: erp_financial_test
  REDIS_HOST: redis
  REDIS_PORT: 6379

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .nx/cache/

.default_script:
  before_script:
    - npm ci --prefer-offline --no-audit
    - apt-get update -qq && apt-get install -y -qq postgresql-client

stages:
  - lint
  - typecheck
  - test
  - build
  - docker

# ── Lint ──────────────────────────────────────────────────────────
lint:
  stage: lint
  script:
    - npx nx affected -t lint --base=origin/main --parallel=3
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'

# ── Typecheck ─────────────────────────────────────────────────────
typecheck:
  stage: typecheck
  script:
    - npx nx affected -t typecheck --base=origin/main --parallel=3
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'

# ── Test ──────────────────────────────────────────────────────────
test:
  stage: test
  services:
    - postgres:16-alpine
    - redis:7-alpine
  script:
    - npx nx affected -t test --base=origin/main --parallel=3
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'

# ── Build ─────────────────────────────────────────────────────────
build:
  stage: build
  script:
    - npx nx affected -t build --base=origin/main --parallel=3
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'

# ── Docker: Build & Push ─────────────────────────────────────────
.docker_template:
  stage: docker
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ''
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
      --build-arg APP=$APP
      -t $CI_REGISTRY_IMAGE/$APP:$CI_COMMIT_SHORT_SHA
      -t $CI_REGISTRY_IMAGE/$APP:latest
      -f docker/Dockerfile
      .
    - docker push $CI_REGISTRY_IMAGE/$APP --all-tags
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
      exists:
        - apps/$APP

docker:auth-service:
  extends: .docker_template
  variables:
    APP: auth-service

docker:identity-service:
  extends: .docker_template
  variables:
    APP: identity-service

docker:payment-service:
  extends: .docker_template
  variables:
    APP: payment-service

docker:settlement-service:
  extends: .docker_template
  variables:
    APP: settlement-service

docker:accounting-service:
  extends: .docker_template
  variables:
    APP: accounting-service

docker:audit-log-service:
  extends: .docker_template
  variables:
    APP: audit-log-service

docker:api-gateway:
  extends: .docker_template
  variables:
    APP: api-gateway

docker:payment-worker:
  extends: .docker_template
  variables:
    APP: payment-worker

docker:settlement-worker:
  extends: .docker_template
  variables:
    APP: settlement-worker

docker:accounting-worker:
  extends: .docker_template
  variables:
    APP: accounting-worker
